name: Deploy Backend

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::922544547054:role/GitHubActionsRole
          aws-region: af-south-1

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push to ECR
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t gidinest-backend .
          docker tag gidinest-backend:latest 922544547054.dkr.ecr.af-south-1.amazonaws.com/gidinest-backend:$IMAGE_TAG
          docker tag gidinest-backend:latest 922544547054.dkr.ecr.af-south-1.amazonaws.com/gidinest-backend:latest
          docker push 922544547054.dkr.ecr.af-south-1.amazonaws.com/gidinest-backend:$IMAGE_TAG
          docker push 922544547054.dkr.ecr.af-south-1.amazonaws.com/gidinest-backend:latest

      - name: Deploy to Elastic Beanstalk
        run: |
          IMAGE_TAG=${{ github.sha }}
          ZIP_FILE="deploy-$IMAGE_TAG.zip"
          zip -r $ZIP_FILE . -x "*.git*" -x "node_modules/*"
          aws s3 cp $ZIP_FILE s3://elasticbeanstalk-af-south-1-922544547054/$ZIP_FILE
          aws elasticbeanstalk create-application-version \
            --application-name gidinest-backend \
            --version-label $IMAGE_TAG \
            --source-bundle S3Bucket=elasticbeanstalk-af-south-1-922544547054,S3Key=$ZIP_FILE \
            --region af-south-1
          aws elasticbeanstalk update-environment \
            --application-name gidinest-backend \
            --environment-name gidinest-prod \
            --version-label $IMAGE_TAG \
            --region af-south-1
